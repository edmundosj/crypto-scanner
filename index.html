<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#00ff87"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="CryptoScan"/>
<link rel="manifest" href="manifest.json"/>
<title>Crypto Scanner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#00ff87;--r:#ff4d4d;--b:#4488ff;--o:#ff8844;--y:#ffd700;--bg:#050505;--bg2:#0d0d0d;--bg3:#151515;--border:#1e1e1e;--muted:#555;--text:#e0e0e0;--text2:#888}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
body.light{--bg:#f2f2ee;--bg2:#fff;--bg3:#e8e8e4;--border:#ddd;--muted:#999;--text:#111;--text2:#666}
body.light .logo{color:#00a050}
body.light .status.live{background:#00a050;box-shadow:0 0 5px #00a050}
body.light .coin-card.sel{background:#e6fff3;border-color:#00a050}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes slideup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes obpulse{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 12px 2px var(--ob-color,#00ff87)}}
/* ── ORDER BOOK BANNER ── */
.ob-banner{margin-bottom:14px;border-radius:14px;border:2px solid;padding:16px;transition:all .4s;animation:fadein .3s ease}
.ob-banner.buy{background:#062b15;border-color:var(--g);--ob-color:#00ff87}
.ob-banner.sell{background:#2b0d0d;border-color:var(--r);--ob-color:#ff4d4d}
.ob-banner.neutral{background:#1a1a1a;border-color:#444;--ob-color:#888}
.ob-banner.alert{animation:obpulse 1s ease 3}
.ob-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ob-signal{font-size:15px;font-weight:700;letter-spacing:.5px}
.ob-banner.buy .ob-signal{color:var(--g)}
.ob-banner.sell .ob-signal{color:var(--r)}
.ob-banner.neutral .ob-signal{color:#888}
/* ── DESTAQUE PRINCIPAL ── */
.ob-highlight{
  border-radius:10px;padding:14px 16px;margin-bottom:12px;
  display:flex;flex-direction:column;gap:8px;
}
.ob-highlight.buy{background:#00ff8715;border:2px solid #00ff87;box-shadow:0 0 20px #00ff8730}
.ob-highlight.sell{background:#ff4d4d15;border:2px solid #ff4d4d;box-shadow:0 0 20px #ff4d4d30}
.ob-highlight.neutral{background:#88888815;border:2px solid #888}
.ob-verdict-big{font-size:22px;font-weight:700;letter-spacing:1px;line-height:1.2}
.ob-highlight.buy .ob-verdict-big{color:#00ff87}
.ob-highlight.sell .ob-verdict-big{color:#ff4d4d}
.ob-highlight.neutral .ob-verdict-big{color:#888}
.ob-facts{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.ob-fact{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.ob-fact strong{color:var(--text)}
@keyframes glowpulse{0%,100%{box-shadow:0 0 20px #00ff8730}50%{box-shadow:0 0 35px #00ff8760}}
.ob-live{font-size:9px;color:var(--muted);display:flex;align-items:center;gap:5px}
.ob-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:pulse 1s infinite}
.ob-bars{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ob-side{display:flex;flex-direction:column;gap:3px}
.ob-side-label{font-size:9px;letter-spacing:1px;margin-bottom:3px}
.ob-side.buys .ob-side-label{color:var(--g)}
.ob-side.sells .ob-side-label{color:var(--r)}
.ob-bar-wrap{display:flex;align-items:center;gap:5px;font-size:9px}
.ob-bar-bg{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.ob-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.ob-buys-fill{background:var(--g)}
.ob-sells-fill{background:var(--r)}
.ob-pressure{display:flex;flex-direction:column;gap:4px}
.ob-pbar-wrap{display:flex;align-items:center;gap:8px;font-size:10px}
.ob-pbar-bg{flex:1;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;position:relative}
.ob-pbar-buy{height:100%;background:var(--g);border-radius:5px 0 0 5px;transition:width .5s;position:absolute;left:0}
.ob-pbar-sell{height:100%;background:var(--r);border-radius:0 5px 5px 0;transition:width .5s;position:absolute;right:0}
.ob-desc{font-size:10px;color:var(--text2);line-height:1.5;margin-top:6px;padding-top:8px;border-top:1px solid #ffffff10}
.ob-ws-badge{font-size:8px;padding:2px 6px;border-radius:10px;background:#ffffff10;color:var(--muted);letter-spacing:1px}
header{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;padding-top:max(11px,env(safe-area-inset-top));border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.logo{color:var(--g);font-size:13px;letter-spacing:3px}
.sub{color:var(--muted);font-size:9px;letter-spacing:2px;margin-top:2px}
.hact{display:flex;align-items:center;gap:10px}
.tbtn{width:40px;height:22px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;cursor:pointer;position:relative;flex-shrink:0}
.tbtn::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--g);transition:transform .3s}
body.light .tbtn::after{transform:translateX(18px);background:#f9a825}
.status{width:7px;height:7px;border-radius:50%;display:inline-block}
.status.live{background:var(--g);box-shadow:0 0 5px var(--g);animation:pulse 2s infinite}
.status.err{background:var(--r);box-shadow:0 0 5px var(--r)}
.tstamp{font-size:9px;color:var(--muted)}
.bell{background:none;border:none;cursor:pointer;color:var(--muted);font-size:17px;position:relative;padding:0 2px}
.bell.on{color:var(--o)}
.bcnt{position:absolute;top:-4px;right:-4px;background:var(--r);color:#fff;font-size:8px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.layout{display:flex;flex:1;overflow:hidden}
aside{width:220px;border-right:1px solid var(--border);overflow-y:auto;padding:12px;background:var(--bg);flex-shrink:0}
main{flex:1;overflow-y:auto;padding:16px}
.clabel{color:var(--muted);font-size:9px;letter-spacing:2px;margin:8px 0 5px;padding-top:8px;border-top:1px solid var(--border)}
.clabel:first-child{border-top:none;padding-top:0;margin-top:0}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;margin-bottom:5px;transition:border-color .2s}
.cc:hover{border-color:var(--muted)}
.cc.sel{background:#0a1a0a;border-color:var(--g)}
body.light .cc.sel{background:#e6fff3;border-color:#00a050}
.crow{display:flex;justify-content:space-between;align-items:center}
.csym{font-weight:700;font-size:12px}
.cname{color:var(--muted);font-size:9px;margin-left:4px}
.cprice{font-size:11px;text-align:right}
.cchg{font-size:10px;text-align:right}
.pos{color:var(--g)}.neg{color:var(--r)}
.cverd{font-size:9px;margin-top:4px;letter-spacing:.3px}
.adot{width:5px;height:5px;border-radius:50%;background:var(--o);display:inline-block;margin-left:4px;box-shadow:0 0 3px var(--o);vertical-align:middle}
.disc{margin-top:10px;font-size:9px;color:var(--muted);line-height:1.6;padding:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:7px 12px;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:color .2s}
.tab.on{color:var(--g);border-bottom-color:var(--g)}
.pbig{font-size:26px;font-weight:700}
.pchg{font-size:16px}
.pmeta{color:var(--muted);font-size:11px;margin-top:4px}
.phead{margin-bottom:14px}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 12px 10px;margin-bottom:14px}
.chart-svg{width:100%;height:140px;overflow:visible}
.chart-leg{display:flex;gap:14px;margin-top:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.slabel{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.irow{margin-bottom:10px}
.irlabel{display:flex;justify-content:space-between;margin-bottom:3px;font-size:10px}
.irlabel span:first-child{color:var(--muted)}
.ibar{height:2px;background:var(--bg3);border-radius:1px}
.ibarfill{height:100%;border-radius:1px;transition:width .5s}
.sig{border-radius:6px;padding:8px 11px;margin-bottom:6px;border:1px solid;animation:fadein .3s ease}
.sig.buy{background:#0d2b1e;border-color:var(--g)}
.sig.sell{background:#2b0d0d;border-color:var(--r)}
.sig.neu{background:var(--bg3);border-color:var(--border)}
.stop{display:flex;justify-content:space-between;align-items:center}
.sigl{font-weight:700;font-size:12px}
.sig.buy .sigl{color:var(--g)}.sig.sell .sigl{color:var(--r)}.sig.neu .sigl{color:var(--muted)}
.sdesc{color:var(--text2);font-size:10px;margin-top:4px;line-height:1.4}
.t20row{display:grid;grid-template-columns:22px 1fr 90px 68px;gap:8px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:5px;cursor:pointer;transition:border-color .2s;font-size:11px}
.t20row:hover{border-color:var(--muted)}
.t20rank{color:var(--muted);font-size:10px}
.t20sym{font-weight:700;font-size:12px}
.t20n{color:var(--muted);font-size:9px}
.overlay2{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px 20px calc(20px + env(safe-area-inset-bottom));animation:slideup .3s ease;max-height:80vh;overflow-y:auto}
.mtitle{font-size:13px;letter-spacing:2px;color:var(--g);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.mclose{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1}
.aform{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.asel,.ainp{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'Space Mono',monospace;font-size:11px;width:100%;outline:none}
.asel:focus,.ainp:focus{border-color:var(--g)}
.arow2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.addbtn{background:var(--g);color:#000;border:none;border-radius:6px;padding:9px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;width:100%}
.aitem{display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;margin-bottom:5px;font-size:11px}
.adel{background:none;border:none;color:var(--r);cursor:pointer;font-size:18px;padding:0 4px}
.toast{position:fixed;top:max(16px,env(safe-area-inset-top));right:16px;z-index:200;background:#0a2a1a;border:1px solid var(--g);border-radius:10px;padding:12px 16px;max-width:270px;animation:slideup .3s ease}
.offbar{background:#1a0d00;padding:5px 16px;font-size:9px;color:var(--o);text-align:center;letter-spacing:1px;flex-shrink:0}
.bnav{display:none;flex-direction:row;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bnbtn{flex:1;padding:9px 4px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.bnbtn.on{color:var(--g)}.bnbtn svg{width:17px;height:17px}
.spin{width:22px;height:22px;border:2px solid var(--bg3);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
.mobover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:49}
option{background:#111}
@media(max-width:600px){
  aside{display:none;position:fixed;top:0;left:0;bottom:0;z-index:50;width:82vw;padding-top:50px}
  aside.open{display:block}
  .bnav{display:flex}
  .grid2{grid-template-columns:1fr}
  .pbig{font-size:22px}
  .layout{height:calc(100vh - 52px - 50px)}
  .mobover{display:none}
  aside.open ~ .mobover{display:block}
}
</style>
</head>
<body>

<script>
// ── COINS ──
const CATS=[
  {label:"💰 BLUE CHIPS", coins:[
    {id:"bitcoin",       sym:"BTC",    name:"Bitcoin"},
    {id:"ethereum",      sym:"ETH",    name:"Ethereum"},
    {id:"binancecoin",   sym:"BNB",    name:"BNB"},
    {id:"solana",        sym:"SOL",    name:"Solana"},
    {id:"ripple",        sym:"XRP",    name:"XRP"},
    {id:"dogecoin",      sym:"DOGE",   name:"Dogecoin"},
    {id:"cardano",       sym:"ADA",    name:"Cardano"},
    {id:"avalanche-2",   sym:"AVAX",   name:"Avalanche"},
    {id:"chiliz",        sym:"CHZ",    name:"Chiliz"},
  ]},
  {label:"🤖 IA & TECNOLOGIA", coins:[
    {id:"render-token",  sym:"RENDER", name:"Render (GPU/IA)"},
    {id:"fetch-ai",      sym:"FET",    name:"Fetch.ai (IA)"},
    {id:"bittensor",     sym:"TAO",    name:"Bittensor (IA)"},
    {id:"the-graph",     sym:"GRT",    name:"The Graph"},
    {id:"chainlink",     sym:"LINK",   name:"Chainlink"},
  ]},
];
const WATCHLIST=CATS.flatMap(c=>c.coins);

// ── STATE ──
let coinsData={}, top20=[], selected="bitcoin", activeTab="chart";
let sidebarOpen=false, darkMode=true, chartData=[];
let alerts=JSON.parse(localStorage.getItem("ca_alerts")||"[]");
let triggeredSet=new Set();

// ── TECHNICAL ANALYSIS ──
function sma(p,n){if(!p||p.length<n)return null;return p.slice(-n).reduce((a,b)=>a+b,0)/n}
function rsi(p,n=14){
  if(!p||p.length<n+1)return null;
  const ch=p.slice(-(n+1)).map((v,i,a)=>i===0?0:v-a[i-1]).slice(1);
  const ag=ch.map(c=>c>0?c:0).reduce((a,b)=>a+b,0)/n;
  const al=ch.map(c=>c<0?Math.abs(c):0).reduce((a,b)=>a+b,0)/n;
  return al===0?100:100-100/(1+ag/al);
}
function patterns(hist,r,s7,s21,price){
  const sigs=[];
  if(!hist||hist.length<5)return sigs;
  const rec=hist.slice(-5),pct=((rec[4]-rec[0])/rec[0])*100;
  if(r!==null){
    if(r<30)sigs.push({t:"buy",l:"RSI Sobrevendido",d:`RSI ${r.toFixed(1)} — potencial reversão de alta`,s:3});
    else if(r>70)sigs.push({t:"sell",l:"RSI Sobrecomprado",d:`RSI ${r.toFixed(1)} — potencial correção`,s:2});
  }
  if(s7&&s21){
    if(s7>s21&&pct>0)sigs.push({t:"buy",l:"Golden Cross",d:"SMA7 acima SMA21 — tendência de alta",s:3});
    else if(s7<s21&&pct<0)sigs.push({t:"sell",l:"Death Cross",d:"SMA7 abaixo SMA21 — tendência de baixa",s:2});
  }
  if(pct>5)sigs.push({t:"buy",l:"Momentum Forte",d:`+${pct.toFixed(2)}% nas últimas horas`,s:2});
  if(pct<-5)sigs.push({t:"sell",l:"Queda Acentuada",d:`${pct.toFixed(2)}% nas últimas horas`,s:2});
  if(s21&&Math.abs(price-s21)/s21<0.015)sigs.push({t:"neu",l:"Teste de Suporte",d:"Preço próximo à SMA21",s:1});
  return sigs;
}

// ── MACD ──
function calcMACD(prices){
  if(!prices||prices.length<26) return null;
  const ema=(p,n)=>{
    const k=2/(n+1); let e=p[0];
    for(let i=1;i<p.length;i++) e=p[i]*k+e*(1-k);
    return e;
  };
  const ema12=ema(prices.slice(-12),12);
  const ema26=ema(prices.slice(-26),26);
  const macdLine=ema12-ema26;
  // Signal line = EMA9 of MACD (approximate)
  const macdValues=[];
  for(let i=26;i<=prices.length;i++){
    const e12=ema(prices.slice(i-12,i),12);
    const e26=ema(prices.slice(i-26,i),26);
    macdValues.push(e12-e26);
  }
  const signal=macdValues.length>=9?ema(macdValues.slice(-9),9):macdLine;
  const histogram=macdLine-signal;
  const bullish=macdLine>signal;
  const crossing=macdValues.length>=2&&((macdValues[macdValues.length-2]<0&&macdLine>0)||(macdValues[macdValues.length-2]>0&&macdLine<0));
  return{macdLine,signal,histogram,bullish,crossing};
}

// ── FIBONACCI ──
function calcFibonacci(prices){
  if(!prices||prices.length<20) return null;
  const recent=prices.slice(-48);
  const high=Math.max(...recent), low=Math.min(...recent);
  const diff=high-low;
  return{
    high, low,
    fib0:high,
    fib236:high-diff*0.236,
    fib382:high-diff*0.382,
    fib500:high-diff*0.500,
    fib618:high-diff*0.618,
    fib786:high-diff*0.786,
    fib1:low
  };
}

// ── STOP LOSS & TAKE PROFIT ──
function calcStopTakeProfit(coin){
  if(!coin||!coin.price||!coin.spark||coin.spark.length<10) return null;
  const recent=coin.spark.slice(-24);
  const high=Math.max(...recent), low=Math.min(...recent);
  const atr=(high-low)*0.5; // Average True Range simplificado
  const price=coin.price;
  // Para COMPRA
  const stopLossBuy=price-(atr*1.5);
  const takeProfit1Buy=price+(atr*1.5); // 1:1
  const takeProfit2Buy=price+(atr*3);   // 1:2
  const takeProfit3Buy=price+(atr*4.5); // 1:3
  const riskBuy=((price-stopLossBuy)/price)*100;
  const reward2Buy=((takeProfit2Buy-price)/price)*100;
  return{
    price,
    stopLoss:stopLossBuy,
    tp1:takeProfit1Buy, tp2:takeProfit2Buy, tp3:takeProfit3Buy,
    risk:riskBuy, reward:reward2Buy,
    rr:(reward2Buy/riskBuy).toFixed(1)
  };
}

// ── CANDLESTICK SVG CHART ──
function candlestickChart(candles, fib){
  if(!candles||candles.length<4) return`<div class="chart-wrap" style="text-align:center;padding:30px;color:var(--muted);font-size:11px">Carregando candlesticks...</div>`;
  const W=600,H=160,P=8;
  const allPrices=candles.flatMap(c=>[c.h,c.l]);
  const mn=Math.min(...allPrices), mx=Math.max(...allPrices), rng=mx-mn||1;
  const cw=Math.max(4,Math.floor((W-P*2)/candles.length)-1);
  const x=i=>P+i*((W-P*2)/candles.length)+(cw/2);
  const y=v=>H-P-((v-mn)/rng)*(H-P*2);
  // Fibonacci lines
  let fibLines="";
  if(fib){
    const fibLevels=[[fib.fib236,"#ff8844","0.236"],[fib.fib382,"#ffd700","0.382"],[fib.fib500,"#4488ff","0.500"],[fib.fib618,"#00ff87","0.618"],[fib.fib786,"#ff4d4d","0.786"]];
    fibLines=fibLevels.map(([v,c,l])=>{
      const yv=y(v);
      if(yv<0||yv>H) return"";
      return`<line x1="${P}" y1="${yv}" x2="${W-P}" y2="${yv}" stroke="${c}" stroke-dasharray="3 3" stroke-width="0.8" opacity=".6"/>
      <text x="${W-P+2}" y="${yv+3}" fill="${c}" font-size="7" font-family="monospace">${l}</text>`;
    }).join("");
  }
  const candlesHtml=candles.map((c,i)=>{
    const cx=x(i), oh=y(Math.max(c.o,c.c)), ol=y(Math.min(c.o,c.c));
    const bodyH=Math.max(1,Math.abs(y(c.o)-y(c.c)));
    const color=c.c>=c.o?"#00ff87":"#ff4d4d";
    return`<line x1="${cx}" y1="${y(c.h)}" x2="${cx}" y2="${y(c.l)}" stroke="${color}" stroke-width="1"/>
    <rect x="${cx-cw/2}" y="${oh}" width="${cw}" height="${bodyH}" fill="${color}" opacity=".9"/>`;
  }).join("");
  return`<div class="chart-wrap">
    <div class="slabel" style="padding-left:4px">CANDLESTICK — ÚLTIMAS ${candles.length}H ${fib?"· FIBONACCI":""}  <span style="color:var(--g);font-size:9px">🟢 ALTA</span> <span style="color:var(--r);font-size:9px;margin-left:8px">🔴 BAIXA</span></div>
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible">
      ${fibLines}
      ${candlesHtml}
    </svg>
    ${fib?`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;font-size:9px">
      <span style="color:#ff8844">━ 0.236</span><span style="color:#ffd700">━ 0.382</span>
      <span style="color:#4488ff">━ 0.500</span><span style="color:#00ff87">━ 0.618</span><span style="color:#ff4d4d">━ 0.786</span>
    </div>`:""}
  </div>`;
}

function calcDecision(coin){

    else if(coin.rsi<45){score+=1;reasons.push({i:"✅",t:`RSI (${coin.rsi.toFixed(1)}): zona interessante, abaixo do neutro`});}

    else if(coin.rsi>55){score-=1;reasons.push({i:"⚠️",t:`RSI (${coin.rsi.toFixed(1)}): levemente elevado, cautela`});}
    else{reasons.push({i:"😐",t:`RSI neutro (${coin.rsi.toFixed(1)}): sem sinal claro`});}
  }
  if(coin.sma7&&coin.sma21){
    const d=((coin.sma7-coin.sma21)/coin.sma21)*100;
    if(d>2){score+=2;reasons.push({i:"✅",t:"Tendência de ALTA confirmada: média rápida bem acima da lenta"});}
    else if(d>0){score+=1;reasons.push({i:"✅",t:"Tendência levemente positiva: médias apontando para cima"});}
    else if(d<-2){score-=2;reasons.push({i:"❌",t:"Tendência de BAIXA confirmada: médias apontando para baixo"});}
    else{score-=1;reasons.push({i:"⚠️",t:"Tendência negativa: médias desfavoráveis"});}

  if(coin.chg<-15){score+=2;reasons.push({i:"✅",t:`Queda muito forte de ${coin.chg.toFixed(1)}%: possível exagero, oportunidade`});}
  else if(coin.chg<-8){score+=1;reasons.push({i:"✅",t:`Queda de ${coin.chg.toFixed(1)}%: preço mais atrativo hoje`});}
  else if(coin.chg>15){score-=2;reasons.push({i:"❌",t:`Alta muito forte de +${coin.chg.toFixed(1)}%: pode estar esticado`});}
  else if(coin.chg>8){score-=1;reasons.push({i:"⚠️",t:`Alta forte de +${coin.chg.toFixed(1)}%: cuidado para não comprar no topo`});}
  else if(coin.chg<-3){reasons.push({i:"😐",t:`Queda leve de ${coin.chg.toFixed(1)}%: mercado fraco hoje`});}
  else if(coin.chg>2){reasons.push({i:"😐",t:`Alta moderada de +${coin.chg.toFixed(1)}%`});}
  if(coin.sma21&&coin.price){
    const d=((coin.price-coin.sma21)/coin.sma21)*100;
    if(d>-2&&d<0){score+=1;reasons.push({i:"✅",t:"Preço testando suporte da média 21h: zona histórica de compra"});}
    else if(d<-10){score+=1;reasons.push({i:"✅",t:"Preço muito abaixo da média: desconto relevante"});}
    else if(d>10){score-=1;reasons.push({i:"⚠️",t:"Preço muito acima da média: pode estar sobrevalorizado"});}
  }
  let verdict,color,bg,emoji,sub;
  if(score>=6){verdict="🔥 EXCELENTE HORA DE COMPRAR";emoji="🚀";color="#00ff87";bg="#062b15";sub="Múltiplos sinais positivos alinhados";}
  else if(score>=4){verdict="✅ BOM PARA COMPRAR";emoji="🟢";color="#00dd77";bg="#0d2b1e";sub="Maioria dos sinais aponta para boa entrada";}
  else if(score>=2){verdict="👍 PODE SER INTERESSANTE";emoji="🟡";color="#ffd700";bg="#2a2000";sub="Alguns sinais positivos, analise com atenção";}
  else if(score>=0){verdict="⏳ AGUARDAR";emoji="⚪";color="#888";bg="#1a1a1a";sub="Sinais mistos, sem direção clara";}

  return{score,verdict,emoji,color,bg,sub,reasons};
}

function calcTrend(spark){
  if(!spark||spark.length<20)return null;
  const l6=spark.slice(-6),l12=spark.slice(-12);
  const s6=((l6[5]-l6[0])/l6[0])*100;
  const s12=((l12[11]-l12[0])/l12[0])*100;
  const rn=rsi(spark),rp=rsi(spark.slice(0,-6));
  const rd=(rn&&rp)?rn-rp:0;
  const sn=sma(spark,7),sp2=sma(spark.slice(0,-3),7);
  const st=sn&&sp2?((sn-sp2)/sp2)*100:0;
  const bull=(s6>1?1:0)+(s12>1?1:0)+(rd>3?1:0)+(st>0.3?1:0);
  const bear=(s6<-1?1:0)+(s12<-1?1:0)+(rd<-3?1:0)+(st<-0.3?1:0);
  if(bull>=3)return{t:"🚀 VALORIZAÇÃO IMINENTE",i:"🚀",c:"#00ff87",bg:"#062b15",d:"Momentum acelerando forte para CIMA — preço subindo, médias em alta, RSI ganhando força!"};
  if(bull>=2)return{t:"📈 VALORIZAÇÃO A CAMINHO",i:"⬆️",c:"#00dd77",bg:"#0a2018",d:"Sinais de alta se formando — momentum positivo nas últimas horas. Tendência virando para cima."};
  if(bear>=3)return{t:"⚠️ DESVALORIZAÇÃO IMINENTE",i:"⚠️",c:"#ff4d4d",bg:"#2b0d0d",d:"Momentum acelerando forte para BAIXO — preço caindo, médias em queda. Cuidado!"};
  if(bear>=2)return{t:"📉 DESVALORIZAÇÃO A CAMINHO",i:"⬇️",c:"#ff8844",bg:"#2b1500",d:"Sinais de queda se formando — momentum negativo detectado. Tendência virando para baixo."};
  if(bull===1&&bear===0)return{t:"↗️ LATERAL COM VIÉS DE ALTA",i:"↗️",c:"#ffd700",bg:"#2a2000",d:"Mercado sem direção forte, mas com leve inclinação positiva."};
  if(bear===1&&bull===0)return{t:"↘️ LATERAL COM VIÉS DE BAIXA",i:"↘️",c:"#ff8844",bg:"#1a1000",d:"Mercado lateral com leve pressão vendedora."};
  return{t:"↔️ MERCADO LATERAL",i:"↔️",c:"#888",bg:"#1a1a1a",d:"Sem tendência definida — mercado em consolidação."};
}

  const y=v=>H-P-((v-mn)/rng)*(H-P*2);
  const pts=data.map((d,i)=>`${x(i)},${y(d.p)}`).join(" ");
  const fill=`${x(0)},${H} `+data.map((d,i)=>`${x(i)},${y(d.p)}`).join(" ")+` ${x(data.length-1)},${H}`;
  const sma7line=s7v?`<line x1="${P}" y1="${y(s7v)}" x2="${W-P}" y2="${y(s7v)}" stroke="#4488ff" stroke-dasharray="4 3" stroke-width="1.2" opacity=".7"/>`:"";
  const sma21line=s21v?`<line x1="${P}" y1="${y(s21v)}" x2="${W-P}" y2="${y(s21v)}" stroke="#ff8844" stroke-dasharray="4 3" stroke-width="1.2" opacity=".7"/>`:"";
  return`<div class="chart-wrap">
    <div class="slabel" style="padding-left:4px">PREÇO — ÚLTIMAS 72H</div>
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00ff87" stop-opacity=".15"/><stop offset="100%" stop-color="#00ff87" stop-opacity="0"/></linearGradient></defs>
      <polygon points="${fill}" fill="url(#cg)"/>
      ${sma7line}${sma21line}
      <polyline points="${pts}" fill="none" stroke="#00ff87" stroke-width="1.8" stroke-linejoin="round"/>
    </svg>
    <div class="chart-leg"><span style="color:#4488ff;font-size:10px">━ SMA7</span><span style="color:#ff8844;font-size:10px">━ SMA21</span></div>
  </div>`;
}

async function fetchAll(){
  if(Object.keys(coinsData).length===0){
    document.getElementById("tabContent").innerHTML='<div class="spin"></div>';
  }
  try{
    const ids=WATCHLIST.map(c=>c.id).join(",");

    const r=await fetch(url);
    if(!r.ok)throw new Error("CoinGecko "+r.status);
    const data=await r.json();
    for(const m of data){
      const wl=WATCHLIST.find(c=>c.id===m.id);
      if(!wl)continue;

    checkAlerts();
    renderCoinList();
    renderTab();
    document.getElementById("tstamp").textContent=new Date().toLocaleTimeString("pt-BR");

      document.getElementById("tabContent").innerHTML=`<div style="color:var(--r);font-size:12px;padding:16px;line-height:1.8">⚠ Erro ao carregar.<br><br><button onclick="fetchAll()" style="background:var(--g);color:#000;border:none;border-radius:6px;padding:8px 16px;font-family:inherit;cursor:pointer;font-size:11px">↺ TENTAR NOVAMENTE</button></div>`;
    }
  }
  // Chart history
  setTimeout(async()=>{
    try{
      const r=await fetch(`https://api.coingecko.com/api/v3/coins/${selected}/market_chart?vs_currency=usd&days=3&interval=hourly`);

const OB_BINANCE_SYM={
  bitcoin:"btcusdt",ethereum:"ethusdt",binancecoin:"bnbusdt",
  solana:"solusdt",ripple:"xrpusdt",dogecoin:"dogeusdt",
  cardano:"adausdt","avalanche-2":"avaxusdt",chiliz:"chzusdt",
  "render-token":"renderusdt","fetch-ai":"fetusdt",
  bittensor:"taousdt","the-graph":"grtusdt",chainlink:"linkusdt"
};
let obWs=null, obData={bids:[],asks:[]}, obCoinId=null;
let obHistory=[];           // histórico completo de snapshots do livro
let obSignalBuffer=[];      // scores por segundo
let obStableVerdict=null;
let obStableScore=null;
let obLastChange=0;
let obCountdownTimer=null;
const OB_STABILITY_SEC=90; // 90s para confirmação mais segura
const OB_SAMPLE_RATE=1000; // 1 snapshot por segundo

// ── Buffer de alta precisão ──
function pushSnapshot(bids, asks, score){
  const ts=Date.now();
  const totalBuyVol=bids.reduce((s,b)=>s+b.q,0);
  const totalSellVol=asks.reduce((s,a)=>s+a.q,0);
  const totalBuyVal=bids.reduce((s,b)=>s+b.p*b.q,0);
  const totalSellVal=asks.reduce((s,a)=>s+a.p*a.q,0);
  obHistory.push({ts,bids:[...bids],asks:[...asks],score,
    totalBuyVol,totalSellVol,totalBuyVal,totalSellVal,
    bestBid:bids[0]?.p||0, bestAsk:asks[0]?.p||0
  });
  obSignalBuffer.push({ts,score});
  // Manter só últimos 120s de histórico
  const cutoff=ts-120000;
  obHistory=obHistory.filter(x=>x.ts>cutoff);
  obSignalBuffer=obSignalBuffer.filter(x=>x.ts>cutoff);
}

// ── Análise de precisão dos últimos 60s ──
function analyzePrecision(){
  if(obHistory.length<5) return null;
  const now=Date.now();
  const last60=obHistory.filter(x=>x.ts>now-60000);
  const last30=obHistory.filter(x=>x.ts>now-30000);
  const last10=obHistory.filter(x=>x.ts>now-10000);
  if(!last60.length) return null;

  // 1. PRESSÃO ACUMULADA: média ponderada (recente vale mais)
  const weightedScore=last60.reduce((s,x,i)=>s+x.score*(i+1),0)/last60.reduce((s,_,i)=>s+(i+1),0);

  // 2. MOMENTUM: está acelerando ou desacelerando?
  const avgScore60=last60.reduce((s,x)=>s+x.score,0)/last60.length;
  const avgScore30=last30.length?last30.reduce((s,x)=>s+x.score,0)/last30.length:avgScore60;
  const avgScore10=last10.length?last10.reduce((s,x)=>s+x.score,0)/last10.length:avgScore30;
  const momentum=avgScore10-avgScore60; // positivo = acelerando para cima

  // 3. CONSISTÊNCIA: quantos % dos samples apontam na mesma direção?
  const bullSamples=last60.filter(x=>x.score>0).length;
  const bearSamples=last60.filter(x=>x.score<0).length;
  const totalSamples=last60.length;
  const bullPct=(bullSamples/totalSamples)*100;
  const bearPct=(bearSamples/totalSamples)*100;
  const consistency=Math.max(bullPct,bearPct); // % de consistência

  // 4. FLUXO DE ORDENS: variação de volume no livro
  const first=last60[0], last=last60[last60.length-1];
  const buyVolChange=last?((last.totalBuyVol-first.totalBuyVol)/Math.max(first.totalBuyVol,1))*100:0;
  const sellVolChange=last?((last.totalSellVol-first.totalSellVol)/Math.max(first.totalSellVol,1))*100:0;

  // 5. SPREAD TREND: está apertando (liquidez aumentando) ou abrindo?
  const spreads=last60.map(x=>x.bestAsk>0&&x.bestBid>0?((x.bestAsk-x.bestBid)/x.bestBid)*100:0).filter(x=>x>0);
  const avgSpread=spreads.length?spreads.reduce((a,b)=>a+b,0)/spreads.length:0;
  const spreadTrend=spreads.length>=2?spreads[spreads.length-1]-spreads[0]:0;

  // 6. ACELERAÇÃO DE COMPRAS: nos últimos 10s vs 30s
  const buyAccel=avgScore10-avgScore30;

  // 7. CONFIANÇA GERAL (0-100)
  let confidence=0;
  confidence+=consistency*0.4;                          // 40% = consistência direcional
  confidence+=Math.min(30, totalSamples*0.5);           // 30% = quantidade de amostras
  confidence+=Math.abs(weightedScore)>3?20:Math.abs(weightedScore)>1?10:0; // 20% = força do sinal
  confidence+=spreadTrend<0?10:0;                       // 10% = spread apertando = boa liquidez
  confidence=Math.min(100,Math.round(confidence));

  return{
    weightedScore, momentum, consistency, bullPct, bearPct,
    buyVolChange, sellVolChange, spreadTrend, avgSpread,
    buyAccel, confidence, totalSamples,
    avgScore60, avgScore30, avgScore10
  };
}

let obRestTimer=null;

async function fetchOrderBookREST(coinId){
  const sym=(OB_BINANCE_SYM[coinId]||"").toUpperCase();
  if(!sym) return;

  // Tenta múltiplas fontes em ordem
  const sources=[
    // Proxy próprio do Vercel — sem CORS
    ()=>fetch(`/api/orderbook?symbol=${sym}`),
  ];

  for(const source of sources){
    try{
      const r=await Promise.race([
        source(),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),4000))
      ]);
      if(!r.ok) continue;
      const d=await r.json();
      if(!d.bids||!d.asks) continue;
      obData.bids=d.bids.map(([p,q])=>({p:parseFloat(p),q:parseFloat(q)})).filter(x=>x.q>0);
      obData.asks=d.asks.map(([p,q])=>({p:parseFloat(p),q:parseFloat(q)})).filter(x=>x.q>0);
      if(!obData.bids.length) continue;
      const a=analyzeOrderBook(obData.bids,obData.asks);
      if(a){ pushSnapshot(obData.bids,obData.asks,a.obScore); updateStableVerdict(a); }
      renderOBPanel("live");
      return; // sucesso!
    }catch(e){ continue; }
  }
  // Todas falharam — simula com dados dos indicadores
  simulateOrderBook(coinId);
}

function simulateOrderBook(coinId){
  const coin=coinsData[coinId];
  if(!coin||!coin.price) return;
  const price=coin.price;
  const rsiVal=coin.rsi||50;
  // Simula pressão baseado nos indicadores
  const buyBias=rsiVal<40?0.65:rsiVal>60?0.35:0.5;
  const bids=[],asks=[];
  for(let i=0;i<10;i++){
    const bp=price*(1-(i+1)*0.001);
    const bq=(buyBias*(5-i*0.3)+Math.random()*0.5);
    bids.push({p:bp,q:bq});
  }
  for(let i=0;i<10;i++){
    const ap=price*(1+(i+1)*0.001);
    const aq=((1-buyBias)*(5-i*0.3)+Math.random()*0.5);
    asks.push({p:ap,q:aq});
  }
  obData.bids=bids; obData.asks=asks;
  const a=analyzeOrderBook(bids,asks);
  if(a){ pushSnapshot(bids,asks,a.obScore); updateStableVerdict(a); }
  renderOBPanel("simulated");
}

function startRESTFallback(coinId){
  if(obRestTimer) return;
  fetchOrderBookREST(coinId);
  obRestTimer=setInterval(()=>{
    if(obCoinId===coinId) fetchOrderBookREST(coinId);
    else{ clearInterval(obRestTimer); obRestTimer=null; }
  },3000);
  if(obCountdownTimer) clearInterval(obCountdownTimer);
  obCountdownTimer=setInterval(()=>{
    const el=document.getElementById("ob-countdown");
    if(el&&obStableVerdict){
      const sec=Math.floor((Date.now()-obLastChange)/1000);
      const prec=analyzePrecision();
      el.textContent=sec>=OB_STABILITY_SEC
        ?`✅ Confirmado há ${sec}s | Confiança: ${prec?.confidence||0}%`
        :`⏳ ${OB_STABILITY_SEC-sec}s para confirmar | Confiança: ${prec?.confidence||0}%`;
    }
  },1000);
}

function connectOrderBook(coinId){
  const sym=OB_BINANCE_SYM[coinId];
  if(!sym){document.getElementById("obPanel").innerHTML="";return;}
  if(obWs){try{obWs.close();}catch(e){}}
  if(obRestTimer){clearInterval(obRestTimer);obRestTimer=null;}
  if(obCountdownTimer){clearInterval(obCountdownTimer);obCountdownTimer=null;}
  obCoinId=coinId;
  obData={bids:[],asks:[]};
  obHistory=[];
  obSignalBuffer=[];
  obStableVerdict=null;
  obLastChange=0;
  renderOBPanel("connecting");

  let wsConnected=false;
  const wsTimeout=setTimeout(()=>{
    if(!wsConnected){ try{obWs?.close();}catch(e){} startRESTFallback(coinId); }
  },5000);

  try{
    obWs=new WebSocket(`wss://stream.binance.com:9443/ws/${sym}@depth100@1000ms`);
    obWs.onopen=()=>{
      wsConnected=true;
      clearTimeout(wsTimeout);
      renderOBPanel("connecting");
      obCountdownTimer=setInterval(()=>{
        const el=document.getElementById("ob-countdown");
        if(el&&obStableVerdict){
          const sec=Math.floor((Date.now()-obLastChange)/1000);
          const prec=analyzePrecision();
          el.textContent=sec>=OB_STABILITY_SEC
            ?`✅ Confirmado há ${sec}s | Confiança: ${prec?.confidence||0}%`
            :`⏳ ${OB_STABILITY_SEC-sec}s para confirmar | Confiança: ${prec?.confidence||0}%`;
        }
      },1000);
    };
    obWs.onmessage=(e)=>{
      try{
        const d=JSON.parse(e.data);
        obData.bids=(d.bids||[]).map(([p,q])=>({p:parseFloat(p),q:parseFloat(q)})).filter(x=>x.q>0);
        obData.asks=(d.asks||[]).map(([p,q])=>({p:parseFloat(p),q:parseFloat(q)})).filter(x=>x.q>0);
        const a=analyzeOrderBook(obData.bids,obData.asks);
        if(a){ pushSnapshot(obData.bids,obData.asks,a.obScore); updateStableVerdict(a); }
        renderOBPanel("live");
      }catch(err){}
    };
    obWs.onerror=()=>{ clearTimeout(wsTimeout); if(!wsConnected) startRESTFallback(coinId); };
    obWs.onclose=()=>{ if(obCoinId===coinId&&!obRestTimer) startRESTFallback(coinId); };
  }catch(e){ clearTimeout(wsTimeout); startRESTFallback(coinId); }
}

function updateStableVerdict(analysis){
  const prec=analyzePrecision();
  const newVerdict=analysis.verdict;
  if(!obStableVerdict){
    obStableVerdict=newVerdict;
    obStableScore=analysis.obScore;
    obLastChange=Date.now();
    return;
  }
  if(!prec) return;
  const secSince=(Date.now()-obLastChange)/1000;
  // Muda só se: 60s+ passaram E consistência >70% E mesma direção
  const dirChanged=(analysis.obScore>0&&obStableScore<=0)||(analysis.obScore<0&&obStableScore>=0)||(analysis.obScore===0&&obStableScore!==0);
  if(dirChanged && prec.consistency>=75 && secSince>=OB_STABILITY_SEC){
    const old=obStableVerdict;
    obStableVerdict=newVerdict;
    obStableScore=analysis.obScore;
    obLastChange=Date.now();
    if(Notification.permission==="granted"){
      new Notification(`🔔 ${coinsData[obCoinId]?.sym||obCoinId} — Sinal mudou!`,{
        body:`${old} → ${newVerdict}`,icon:"icons/icon-192.png"
      });
    }
    showToast(`🔔 SINAL MUDOU — ${coinsData[obCoinId]?.sym||obCoinId}`,newVerdict);
  }
}


function analyzeOrderBook(bids,asks){
  if(!bids.length||!asks.length) return null;

  // ── Análise do livro COMPLETO (100 níveis) ──
  const totalBuyVol=bids.reduce((s,b)=>s+b.q,0);         // qtd total compra
  const totalSellVol=asks.reduce((s,a)=>s+a.q,0);        // qtd total venda
  const totalBuyVal=bids.reduce((s,b)=>s+b.p*b.q,0);     // valor $ total compra
  const totalSellVal=asks.reduce((s,a)=>s+a.p*a.q,0);    // valor $ total venda
  const total=totalBuyVal+totalSellVal;
  const buyPct=(totalBuyVal/total)*100;
  const sellPct=(totalSellVal/total)*100;
  const ratio=totalBuyVal/totalSellVal;

  // Top 5 para exibição
  const top5bids=bids.slice(0,5);
  const top5asks=asks.slice(0,5);
  const bigBid=bids.reduce((mx,b)=>b.q>mx.q?b:mx,bids[0]);
  const bigAsk=asks.reduce((mx,a)=>a.q>mx.q?a:mx,asks[0]);
  const spread=((asks[0].p-bids[0].p)/bids[0].p)*100;

  // ── Análise de concentração (baleias) ──
  // Top 5 bids representam quanto % do total?
  const top5BidVol=top5bids.reduce((s,b)=>s+b.q,0);
  const top5AskVol=top5asks.reduce((s,a)=>s+a.q,0);
  const bidConcentration=(top5BidVol/totalBuyVol)*100;
  const askConcentration=(top5AskVol/totalSellVol)*100;
  const whaleBuying=bidConcentration>40; // baleias concentrando compras
  const whaleSelling=askConcentration>40;

  // ── Score integrado ──
  const coin=coinsData[selected];
  let obScore=0;
  const obReasons=[];

  // 1. Pressão geral (ratio de valor $)
  if(ratio>1.8){obScore+=4;obReasons.push({i:"🟢",t:`${buyPct.toFixed(0)}% do volume é COMPRA ($${(totalBuyVal/1000).toFixed(0)}K) — mercado dominado por compradores`});}
  else if(ratio>1.4){obScore+=3;obReasons.push({i:"🟢",t:`${buyPct.toFixed(0)}% do volume é COMPRA — forte pressão compradora no livro inteiro`});}
  else if(ratio>1.15){obScore+=2;obReasons.push({i:"✅",t:`${buyPct.toFixed(0)}% do volume é COMPRA — boa dominância compradora`});}
  else if(ratio>1.03){obScore+=1;obReasons.push({i:"✅",t:`${buyPct.toFixed(0)}% do volume é COMPRA — leve vantagem compradora`});}
  else if(ratio<0.55){obScore-=4;obReasons.push({i:"🔴",t:`${sellPct.toFixed(0)}% do volume é VENDA ($${(totalSellVal/1000).toFixed(0)}K) — mercado dominado por vendedores`});}
  else if(ratio<0.71){obScore-=3;obReasons.push({i:"🔴",t:`${sellPct.toFixed(0)}% do volume é VENDA — forte pressão vendedora no livro inteiro`});}
  else if(ratio<0.87){obScore-=2;obReasons.push({i:"🔴",t:`${sellPct.toFixed(0)}% do volume é VENDA — boa dominância vendedora`});}
  else if(ratio<0.97){obScore-=1;obReasons.push({i:"⚠️",t:`${sellPct.toFixed(0)}% do volume é VENDA — leve vantagem vendedora`});}
  else{obReasons.push({i:"⚖️",t:`Volume equilibrado: ${buyPct.toFixed(0)}% compra / ${sellPct.toFixed(0)}% venda`});}

  // 2. Baleias
  if(whaleBuying&&obScore>0){obScore+=1;obReasons.push({i:"🐋",t:`Baleias concentrando COMPRAS — ${bidConcentration.toFixed(0)}% do volume nos top 5 compradores`});}
  if(whaleSelling&&obScore<0){obScore-=1;obReasons.push({i:"🐋",t:`Baleias concentrando VENDAS — ${askConcentration.toFixed(0)}% do volume nos top 5 vendedores`});}

  // 3. Muro de compra / venda
  const muralBuyPct=(bigBid.q/totalBuyVol)*100;
  const muralSellPct=(bigAsk.q/totalSellVol)*100;
  if(muralBuyPct>20){obScore+=1;obReasons.push({i:"🧱",t:`Muro de COMPRA em $${bigBid.p.toLocaleString("en-US",{maximumFractionDigits:4})} — ${muralBuyPct.toFixed(0)}% de toda a demanda num só nível`});}
  if(muralSellPct>20){obScore-=1;obReasons.push({i:"🧱",t:`Muro de VENDA em $${bigAsk.p.toLocaleString("en-US",{maximumFractionDigits:4})} — ${muralSellPct.toFixed(0)}% de toda a oferta num só nível`});}

  // 4. Confirmar com RSI
  if(coin?.rsi!=null){
    if(coin.rsi<35&&obScore>0){obScore+=1;obReasons.push({i:"✅",t:`RSI baixo (${coin.rsi.toFixed(1)}) + pressão de compra = entrada confirmada`});}
    if(coin.rsi>65&&obScore<0){obScore-=1;obReasons.push({i:"⚠️",t:`RSI alto (${coin.rsi.toFixed(1)}) + pressão de venda = saída confirmada`});}
  }

  // 5. Confirmar com tendência SMA
  if(coin?.sma7&&coin?.sma21){
    if(coin.sma7>coin.sma21&&obScore>0){obScore+=1;obReasons.push({i:"✅",t:"Tendência de alta + pressão de compra = sinal duplo confirmado"});}
    if(coin.sma7<coin.sma21&&obScore<0){obScore-=1;obReasons.push({i:"⚠️",t:"Tendência de baixa + pressão de venda = sinal duplo confirmado"});}
  }

  // ── Veredicto ──
  let verdict,vcolor,vbg,vemoji,vdesc;
  if(obScore>=6){verdict="🚀 HORA DE COMPRAR";vcolor="#00ff87";vbg="#062b15";vemoji="🚀";vdesc="Livro completo dominado por compradores + todos indicadores alinhados. Sinal MUITO FORTE de compra.";}
  else if(obScore>=4){verdict="✅ BOA HORA PARA COMPRAR";vcolor="#00dd77";vbg="#0d2b1e";vemoji="🟢";vdesc="Pressão de compra sólida confirmada. Boa janela de entrada com risco controlado.";}
  else if(obScore>=2){verdict="👀 SINAL FRACO — AGUARDAR CONFIRMAÇÃO";vcolor="#ffd700";vbg="#2a2000";vemoji="🟡";vdesc="Alguma pressão compradora, mas insuficiente. Aguarde 90s de confirmação antes de agir.";}
  else if(obScore===0){verdict="⏳ AGUARDAR";vcolor="#888";vbg="#1a1a1a";vemoji="⚪";vdesc="Mercado equilibrado. Sem direção definida — não entre agora.";}
  else if(obScore>=-2){verdict="⚠️ NÃO COMPRAR";vcolor="#ff8844";vbg="#2b1500";vemoji="🔴";vdesc="Pressão de venda detectada. Evite entrar — risco de queda.";}
  else{verdict="🛑 VENDER / NÃO COMPRAR";vcolor="#ff4d4d";vbg="#2b0d0d";vemoji="🔴";vdesc="Livro dominado por vendedores + indicadores negativos. Sinal FORTE de saída.";}

  return{verdict,vcolor,vbg,vemoji,vdesc,obScore,obReasons,
    buyPct,sellPct,ratio,totalBuyVal,totalSellVal,
    totalBuyVol,totalSellVol,bigBid,bigAsk,spread,
    whaleBuying,whaleSelling,bids:top5bids,asks:top5asks};
}

  // 2. Muro de compra forte (suporte)
  const muralBuyPct=(bigBid.q/bids.reduce((s,b)=>s+b.q,0))*100;
  if(muralBuyPct>25){obScore+=1;obReasons.push({i:"🧱",t:`Muro de COMPRA em $${bigBid.p.toLocaleString("en-US",{maximumFractionDigits:4})} — grande suporte de compradores nesse preço`});}

  // 3. Muro de venda forte (resistência)
  const muralSellPct=(bigAsk.q/asks.reduce((s,a)=>s+a.q,0))*100;
  if(muralSellPct>25){obScore-=1;obReasons.push({i:"🧱",t:`Muro de VENDA em $${bigAsk.p.toLocaleString("en-US",{maximumFractionDigits:4})} — grande resistência de vendedores nesse preço`});}

  // 4. Cruzar com RSI
  if(coin?.rsi!=null){
    if(coin.rsi<35&&obScore>0){obScore+=1;obReasons.push({i:"✅",t:`RSI baixo (${coin.rsi.toFixed(1)}) + pressão de compra = confirmação de reversão de alta`});}
    if(coin.rsi>65&&obScore<0){obScore-=1;obReasons.push({i:"⚠️",t:`RSI alto (${coin.rsi.toFixed(1)}) + pressão de venda = confirmação de reversão de baixa`});}
  }

  // 5. Cruzar com tendência SMA
  if(coin?.sma7&&coin?.sma21){
    if(coin.sma7>coin.sma21&&obScore>0){obScore+=1;obReasons.push({i:"✅",t:"Tendência de alta + pressão de compra = sinal confirmado"});}
    if(coin.sma7<coin.sma21&&obScore<0){obScore-=1;obReasons.push({i:"⚠️",t:"Tendência de baixa + pressão de venda = sinal confirmado"});}
  }

  // ── Veredicto final ──
  let verdict,vcolor,vbg,vemoji,vdesc;
  if(obScore>=4){
    verdict="🚀 HORA DE COMPRAR";vcolor="#00ff87";vbg="#062b15";vemoji="🚀";
    vdesc="Livro de ordens + indicadores técnicos alinhados: forte sinal de COMPRA agora.";
  } else if(obScore>=2){
    verdict="✅ BOA HORA PARA COMPRAR";vcolor="#00dd77";vbg="#0d2b1e";vemoji="🟢";
    vdesc="Pressão de compra confirmada pelos indicadores. Boa janela de entrada.";
  } else if(obScore>=1){
    verdict="👀 POSSÍVEL HORA DE COMPRAR";vcolor="#ffd700";vbg="#2a2000";vemoji="🟡";
    vdesc="Sinais levemente favoráveis para compra, mas aguarde mais confirmação.";
  } else if(obScore===0){
    verdict="⏳ AGUARDAR — SEM SINAL CLARO";vcolor="#888";vbg="#1a1a1a";vemoji="⚪";
    vdesc="Ordens equilibradas sem direção definida. Não é hora de comprar nem vender.";
  } else if(obScore>=-2){
    verdict="⚠️ NÃO COMPRAR AGORA";vcolor="#ff8844";vbg="#2b1500";vemoji="🔴";
    vdesc="Pressão de venda detectada. Evite entrar agora — aguarde o mercado estabilizar.";
  } else {
    verdict="🛑 HORA DE VENDER / NÃO COMPRAR";vcolor="#ff4d4d";vbg="#2b0d0d";vemoji="🔴";
    vdesc="Forte pressão de venda confirmada pelos indicadores. Sinal claro de saída ou espera.";
  }

  return{verdict,vcolor,vbg,vemoji,vdesc,obScore,obReasons,
    buyPct,sellPct,ratio,totalBuy,totalSell,bigBid,bigAsk,spread,bids,asks};
}
